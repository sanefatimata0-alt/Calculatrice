<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
</head>
<link rel="stylesheet" href="style.css">
<body>

    <div class="container">

        <div class="calculator">

            <div class="display">
                <div class="historique" id="historique">0</div>
                <div class="resultat" id="resultat">0</div>
            </div>

            <div class="buttons">

                <button class="btn-action btn-operateur" data-value="/">÷</button>
                <button class="btn-action btn-effacer" data-action="effacer">C</button>
                <button class="btn-action" data-action="supprimer">AC</button>
                <button class="btn-action" data-action="ans">ANS</button>

                <button class="btn-action btn-operateur" data-value="*">x</button>
                <button class="btn-number" data-value="7">7</button>
                <button class="btn-number" data-value="8">8</button>
                <button class="btn-number" data-value="9">9</button>

                <button class="btn-action btn-operateur" data-value="-">-</button>
                <button class="btn-number" data-value="4">4</button>
                <button class="btn-number" data-value="5">5</button>
                <button class="btn-number" data-value="6">6</button>

                <button class="btn-action btn-operateur" data-value="+">+</button>
                <button class="btn-number" data-value="1">1</button>
                <button class="btn-number" data-value="2">2</button>
                <button class="btn-number" data-value="3">3</button>

                <button class="btn-equal" data-action="equals">=</button>
                <button class="btn-number" data-value="0">0</button>
                <button class="btn-virgule" data-value=".">.</button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
